  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: #efebe2;
    color: var(--ink);
    min-height: 100vh;
    padding: 30px 20px;
    line-height: 1.6;
  }
  body[dir="rtl"] { font-family: 'Cairo', 'Inter', sans-serif; }

  .toolbar {
    max-width: 850px;
    margin: 0 auto 25px;
    background: white;
    border-radius: 14px;
    padding: 14px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    flex-wrap: wrap;
    gap: 12px;
  }
  .lang-switcher { display: flex; gap: 6px; }
  .lang-btn {
    background: var(--paper-warm);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    color: var(--ink-soft);
  }
  .lang-btn:hover { background: var(--highlight); }
  .lang-btn.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .print-btn {
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .print-btn:hover { background: #a07d44; }

  .portfolio {
    max-width: 850px;
    margin: 0 auto;
    background: var(--paper);
    padding: 60px 65px;
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    position: relative;
    min-height: 1100px;
  }
  .portfolio::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 1px solid var(--line);
    margin: 18px;
    pointer-events: none;
    border-radius: 2px;
  }

  .masthead {
    text-align: center;
    border-bottom: 3px double var(--ink);
    padding-bottom: 28px;
    margin-bottom: 36px;
  }
  .masthead .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 600;
  }
  body[dir="rtl"] .masthead .eyebrow { letter-spacing: 2px; }
  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-size: 42px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  body[dir="rtl"] .masthead h1 { font-family: 'Cairo', sans-serif; }
  .masthead .date {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    letter-spacing: 1px;
  }

  .identity {
    background: var(--paper-warm);
    border: 1px solid var(--line);
    padding: 22px 28px;
    margin-bottom: 36px;
    border-radius: 2px;
  }
  .identity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 30px;
  }
  .identity-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .identity-item .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 600;
  }
  .identity-item .val {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    color: var(--ink);
    font-weight: 500;
  }
  body[dir="rtl"] .identity-item .val { font-family: 'Cairo', sans-serif; }

  .section { margin-bottom: 34px; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }

    font-family: 'Fraunces', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 600;
    line-height: 1;
  }

    font-size: 22px;
    color: var(--ink);
    font-weight: 600;
    flex-grow: 1;
  }
  body[dir="rtl"] .section-title,
  body[dir="rtl"] .section-num { font-family: 'Cairo', sans-serif; }

  .choices-label {
    font-size: 12px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    font-weight: 600;

  .choices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;

    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .choice img {

    height: 70px;
    object-fit: contain;
    margin-bottom: 8px;
    border-radius: 4px;
  }
  .choice .name {
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
    line-height: 1.3;
  }

    background: var(--paper-warm);
    border: 1px solid var(--line);
    padding: 22px 26px;
    border-radius: 2px;
    margin-bottom: 14px;
  }
  .top3-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 14px;
    font-weight: 700;
    text-align: center;

  .top3-list {
    display: flex;
    justify-content: space-around;
    gap: 14px;

  .top3-item .score {

    color: var(--gold);

  }

    border: 1px solid var(--line);
    border-radius: 4px;

    margin-bottom: 6px;

// Fonction de traduction d'un choix
function translateChoice(text, lang) {
  if (lang === 'fr') return text;
  const entry = CHOICES_DICT[text];
  if (!entry) return text; // Pas de traduction dispo : on garde le français
  return entry[lang] || text;
}

// ============================================================
// ÉTAT GLOBAL
// ============================================================
let submissionData = null;
let currentLang = 'fr';

// ============================================================
// CHARGEMENT
// ============================================================
async function loadSubmission() {
  const urlParams = new URLSearchParams(window.location.search);
  const submissionId = urlParams.get('id');
  const t = T[currentLang];

  if (!submissionId) {
    showError(t.error_no_id);
    return;
  }

  try {
    const url = `https://api.jotform.com/submission/${submissionId}?apiKey=${API_KEY}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    if (data.responseCode !== 200) throw new Error(data.message || 'Unknown error');
    submissionData = data.content;
    render();
  } catch (err) {
    showError(t.error_api + ': ' + err.message);
  }
}

function showError(message) {
  document.getElementById('content').innerHTML = `
    <div class="error">
      <strong>⚠️ ${message}</strong>
      <code>${window.location.href}</code>
    </div>
  `;
}

// ============================================================
// EXTRACTION DES DONNÉES
// ============================================================
function getFieldValue(uniqueName) {
  if (!submissionData || !submissionData.answers) return null;
  for (const key in submissionData.answers) {
    const ans = submissionData.answers[key];
    if (ans.name === uniqueName) return ans;
  }
  return null;
}

function getText(uniqueName) {
  const f = getFieldValue(uniqueName);
  if (!f) return '';
  return f.answer || '';
}

function getNumber(uniqueName) {
  const v = getText(uniqueName);
  return v ? parseInt(v) || 0 : 0;
}

// Récupère un tableau de choix avec leurs images
// Format Jotform : "NomDuChoix|URLdelImage"
function getChoicesWithImages(uniqueName) {
  const f = getFieldValue(uniqueName);
  if (!f || !f.answer) return [];
  let answers = f.answer;
  if (typeof answers === 'string') answers = [answers];
  if (!Array.isArray(answers)) answers = Object.values(answers || {});

  return answers.map(a => {
    const str = String(a).trim();
    const pipeIdx = str.indexOf('|');
    if (pipeIdx > -1) {
      return {
        name: str.substring(0, pipeIdx).trim(),
        img: str.substring(pipeIdx + 1).trim()
      };
    }
    return { name: str, img: null };
  });
}

// Récupère un seul choix Oui/Non avec son image
// Renvoie { name, img } ou null
function getSingleChoiceWithImage(uniqueName) {
  const arr = getChoicesWithImages(uniqueName);
  if (arr.length === 0) return null;
  return arr[0];
}

function computeTop3(scoresArray) {
  return scoresArray
    .filter(s => s.value > 0)
    .sort((a, b) => b.value - a.value)
    .slice(0, 3);
}

// ============================================================
// RENDU
// ============================================================
function render() {
  const t = T[currentLang];
  document.documentElement.lang = currentLang;
  document.body.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
  document.getElementById('print-label').textContent = t.print;

  const today = new Date().toLocaleDateString(
    currentLang === 'ar' ? 'ar-EG' : (currentLang === 'en' ? 'en-US' : 'fr-FR'),
    { day: 'numeric', month: 'long', year: 'numeric' }
  );

  const riasecScores = [
    { key: 'R', label: t.riasec.R, value: getNumber(FIELDS.score_R) },
    { key: 'I', label: t.riasec.I, value: getNumber(FIELDS.score_I) },
    { key: 'A', label: t.riasec.A, value: getNumber(FIELDS.score_A) },
    { key: 'S', label: t.riasec.S, value: getNumber(FIELDS.score_S) },
    { key: 'E', label: t.riasec.E, value: getNumber(FIELDS.score_E) },
    { key: 'C', label: t.riasec.C, value: getNumber(FIELDS.score_C) }
  ];
  const topRiasec = computeTop3(riasecScores);

  const intelScores = [
    { key: 'ling', label: t.intel.ling, value: getNumber(FIELDS.score_ling) },
    { key: 'log', label: t.intel.log, value: getNumber(FIELDS.score_log) },
    { key: 'spat', label: t.intel.spat, value: getNumber(FIELDS.score_spat) },
    { key: 'mus', label: t.intel.mus, value: getNumber(FIELDS.score_mus) },
    { key: 'kin', label: t.intel.kin, value: getNumber(FIELDS.score_kin) },
    { key: 'inter', label: t.intel.inter, value: getNumber(FIELDS.score_inter) },
    { key: 'intra', label: t.intel.intra, value: getNumber(FIELDS.score_intra) },
    { key: 'nat', label: t.intel.nat, value: getNumber(FIELDS.score_nat) }
  ];
  const topIntel = computeTop3(intelScores);

  const characteristics = getChoicesWithImages(FIELDS.characteristics);
  const domains = getChoicesWithImages(FIELDS.domains);
  const skills = getChoicesWithImages(FIELDS.skills);
  const values = getChoicesWithImages(FIELDS.values);
  const realisations = getChoicesWithImages(FIELDS.realisations);
  const formations = getChoicesWithImages(FIELDS.formations);

  const interested = getSingleChoiceWithImage(FIELDS.interested);
  const knowsPro = getSingleChoiceWithImage(FIELDS.knows_pro);

  const html = `
    <div class="portfolio">
      <header class="masthead">
        <div class="eyebrow">${t.eyebrow}</div>
        <h1>${t.title}</h1>
        <div class="date">${t.date} ${today}</div>
      </header>

      <div class="identity">
        <div class="identity-grid">
          <div class="identity-item">
            <span class="lbl">${t.name}</span>
            <span class="val">${getText(FIELDS.name) || '—'}</span>
          </div>
          <div class="identity-item">
            <span class="lbl">${t.age}</span>
            <span class="val">${getText(FIELDS.age) || '—'}</span>
          </div>
          <div class="identity-item" style="grid-column: 1/-1">
            <span class="lbl">${t.school}</span>
            <span class="val">${getText(FIELDS.school) || '—'}</span>
          </div>
        </div>
      </div>

      <section class="section">
        <div class="section-header">
          <span class="section-num">${t.section1_num}</span>
          <span class="section-title">${t.section1}</span>
        </div>
        ${renderChoicesBlock(t.characteristics, characteristics, t.no_selection)}
        ${renderChoicesBlock(t.domains, domains, t.no_selection)}
        ${renderChoicesBlock(t.skills, skills, t.no_selection)}
        ${renderChoicesBlock(t.values, values, t.no_selection)}
        ${renderChoicesBlock(t.realisations, realisations, t.no_selection)}
      </section>

      <section class="section">
        <div class="section-header">
          <span class="section-num">${t.section2_num}</span>
          <span class="section-title">${t.section2}</span>
        </div>
        ${renderTop3(t.top3_riasec, topRiasec)}
      </section>

      <section class="section">
        <div class="section-header">
          <span class="section-num">${t.section3_num}</span>
          <span class="section-title">${t.section3}</span>
        </div>
        ${renderTop3(t.top3_intel, topIntel)}
      </section>

      <section class="section">
        <div class="section-header">
          <span class="section-num">${t.section4_num}</span>
          <span class="section-title">${t.section4}</span>
        </div>
        ${renderProBlock(t.interested, interested, t.not_answered)}
        ${formations.length > 0 ? renderChoicesBlock(t.chosen_formations, formations, t.no_selection) : ''}
        ${renderProBlock(t.knows_pro, knowsPro, t.not_answered)}
      </section>
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

function renderChoicesBlock(label, items, emptyMessage) {
  if (!items || items.length === 0) {
    return `
      <div class="choices-block">
        <div class="choices-label">${label}</div>
        <p style="color: var(--ink-soft); font-style: italic; font-size: 14px;">${emptyMessage}</p>
      </div>
    `;
  }
  return `
    <div class="choices-block">
      <div class="choices-label">${label}</div>
      <div class="choices-grid">
        ${items.map(it => `
          <div class="choice">
            ${it.img ? `<img src="${it.img}" alt="" onerror="this.style.display='none'">` : ''}
            <div class="name">${translateChoice(it.name, currentLang)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderProBlock(label, item, emptyMessage) {
  if (!item) {
    return `
      <div class="pro-block">
        <div class="label">${label}</div>
        <div class="value empty">${emptyMessage}</div>
      </div>
    `;
  }
  return `
    <div class="pro-block">
      <div class="label">${label}</div>
      <div class="value">${translateChoice(item.name, currentLang)}</div>
    </div>
  `;
}

function renderTop3(title, top3) {
  if (!top3 || top3.length === 0) {
    return `<p style="color: var(--ink-soft); font-style: italic;">${T[currentLang].no_selection}</p>`;
  }
  const medals = ['🥇', '🥈', '🥉'];
  return `
    <div class="top3">
      <div class="top3-title">${title}</div>
      <div class="top3-list">
        ${top3.map((s, i) => `
          <div class="top3-item">
            <span class="medal">${medals[i]}</span>
            <div class="name">${s.label}</div>
            <div class="score">${s.value} ${T[currentLang].pts}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    if (submissionData) render();
  });
});

loadSubmission();
</script>
